name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2"
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Validate notebooks and Hermes lab artifacts
        run: |
          python -m json.tool notebooks/unitree_g1_colab_ik_bench.ipynb >/dev/null
          python -m json.tool notebooks/unitree_hermes_agent_lab.ipynb >/dev/null
          unitree-hermes-lab --workdir /tmp/unitree-hermes-ci --json >/tmp/unitree-hermes-ci.json
          python skill/unitree-hermes-colab/scripts/check_lab_artifacts.py /tmp/unitree-hermes-ci/artifacts/unitree-hermes-review.json

